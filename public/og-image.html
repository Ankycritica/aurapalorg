<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;
    background:#080C18;font-family:system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;position:relative;}
  .grid{position:absolute;inset:0;opacity:.04;
    background-image:linear-gradient(#00C4EE 1px,transparent 1px),
    linear-gradient(90deg,#00C4EE 1px,transparent 1px);
    background-size:60px 60px;}
  .g1{position:absolute;top:-100px;left:20%;width:500px;height:500px;
    border-radius:50%;background:#00C4EE;opacity:.12;filter:blur(120px);}
  .g2{position:absolute;bottom:-100px;right:20%;width:400px;height:400px;
    border-radius:50%;background:#7C6FF7;opacity:.1;filter:blur(100px);}
  .content{position:relative;z-index:10;text-align:center;padding:0 80px;}
  .badge{display:inline-flex;align-items:center;gap:8px;
    background:rgba(0,196,238,.1);border:1px solid rgba(0,196,238,.3);
    border-radius:100px;padding:8px 20px;margin-bottom:24px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#00C4EE;}
  .badge-t{color:#00C4EE;font-size:14px;font-weight:600;letter-spacing:.05em;}
  h1{color:white;font-size:68px;font-weight:800;line-height:1.1;
    letter-spacing:-.02em;margin-bottom:16px;}
  h1 span{color:#00C4EE;}
  .sub{color:rgba(255,255,255,.5);font-size:20px;margin-bottom:36px;}
  .tools{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .tool{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    border-radius:100px;padding:7px 16px;color:rgba(255,255,255,.7);font-size:13px;}
  .url{position:absolute;bottom:28px;right:36px;
    color:#00C4EE;font-size:15px;font-weight:500;opacity:.7;}
</style>
</head>
<body>
<div class="grid"></div><div class="g1"></div><div class="g2"></div>
<div class="content">
  <div class="badge"><div class="dot"></div>
    <span class="badge-t">FREE AI CAREER ENGINE</span></div>
  <h1>Land Your Dream Job<br>with <span>AI</span> on Your Side</h1>
  <p class="sub">10 AI-powered career tools · Free to start · No credit card</p>
  <div class="tools">
    <span class="tool">Resume Builder</span>
    <span class="tool">Cover Letter</span>
    <span class="tool">Interview Prep</span>
    <span class="tool">LinkedIn Roaster 🔥</span>
    <span class="tool">Am I Underpaid? 💸</span>
    <span class="tool">Startup Validator 🚀</span>
  </div>
</div>
<div class="url">aurapal.org</div>
</body>
</html>
